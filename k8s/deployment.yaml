apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution-service
  labels:
    app: execution-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: execution-service
  template:
    metadata:
      labels:
        app: execution-service
    spec:
      containers:
        - name: execution-service
          image: ${IMAGE_URI}
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: execution-service-config
            - secretRef:
                name: execution-service-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: execution-service
  labels:
    app: execution-service
spec:
  type: ClusterIP
  selector:
    app: execution-service
  ports:
    - port: 80
      targetPort: 3002
      protocol: TCP
