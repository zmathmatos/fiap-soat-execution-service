name: CD - Build, Push to ECR and Deploy to EKS

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".gitignore"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'fiap-soat' }}
  APP_NAME: execution-service

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

      - name: Compute image metadata
        id: meta
        run: |
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          TAG="${GITHUB_SHA::7}"
          URI="$REGISTRY/$ECR_REPOSITORY:$TAG"
          echo "image_tag=$TAG"  >> "$GITHUB_OUTPUT"
          echo "image_uri=$URI"  >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build & push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_uri }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name   "$EKS_CLUSTER_NAME"

      - name: Ensure namespace exists
        run: |
          kubectl get namespace "$K8S_NAMESPACE" >/dev/null 2>&1 \
            || kubectl create namespace "$K8S_NAMESPACE"

      - name: Apply ConfigMap
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          kubectl -n "$K8S_NAMESPACE" create configmap "${APP_NAME}-config" \
            --from-literal=DB_HOST="$DB_HOST" \
            --from-literal=DB_PORT="$DB_PORT" \
            --from-literal=DB_NAME="$DB_NAME" \
            --from-literal=DB_SCHEMA="execution" \
            --from-literal=PORT="3002" \
            --from-literal=NODE_ENV="production" \
            --from-literal=LOG_LEVEL="info" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Secret
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
        run: |
          kubectl -n "$K8S_NAMESPACE" create secret generic "${APP_NAME}-secret" \
            --from-literal=DB_USER="$DB_USER" \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --from-literal=RABBITMQ_URL="$RABBITMQ_URL" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render & apply manifests
        env:
          IMAGE_URI: ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}
        run: |
          for f in k8s/*.yaml; do
            echo "Applying $f"
            envsubst '${IMAGE_URI}' < "$f" | kubectl -n "$K8S_NAMESPACE" apply -f -
          done

      - name: Wait for rollout
        run: |
          kubectl -n "$K8S_NAMESPACE" rollout status \
            deployment/${APP_NAME} --timeout=300s

      - name: Show service
        run: |
          kubectl -n "$K8S_NAMESPACE" get svc,deploy,pods
